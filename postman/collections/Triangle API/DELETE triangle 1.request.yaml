$kind: http-request
name: DELETE triangle
description: |-
  Deletes a triangle by id.

  Expected responses:
  - 200 OK: returns the deleted triangle (JSON with id, type, sides).
  - 204 No Content: triangle deleted successfully with an empty body.
  - 404 Not Found: triangle id does not exist (JSON with a detail message).
method: DELETE
url: "{{url}}/triangles/"
order: 4502299317249934
scripts:
  - type: afterResponse
    code: >-
      // Fallback to deleting triangle 1 if no triangleId variable is set.

      // (This keeps backwards-compatible behavior with the original request
      URL.)

      const triangleId = pm.variables.get('triangleId') || '1';

      pm.request.url.variables.set('triangleId', String(triangleId));


      pm.test('Delete triangle: status is 200 (deleted with body) OR 204
      (deleted) OR 404 (not found)', function () {
        pm.expect([200, 204, 404]).to.include(pm.response.code);
      });


      pm.test('Response time < 1000ms', function () {
        pm.expect(pm.response.responseTime).to.be.below(1000);
      });


      if (pm.response.code === 200) {
        let json;
        try { json = pm.response.json(); } catch (e) { json = null; }

        pm.test('200 response body has expected triangle shape (id, type, sides)', function () {
          pm.expect(json).to.be.an('object');
          pm.expect(json).to.have.property('id');
          pm.expect(json).to.have.property('type');
          pm.expect(json).to.have.property('sides');

          pm.expect(String(json.id)).to.eql(String(triangleId));
          pm.expect(json.type).to.be.a('string');
          pm.expect(json.sides).to.be.an('array');
          pm.expect(json.sides.length).to.eql(3);
          json.sides.forEach((s) => pm.expect(s).to.be.a('number'));
        });
      } else if (pm.response.code === 204) {
        pm.test('204 response has an empty body', function () {
          pm.expect(pm.response.text() || '').to.eql('');
        });
      } else if (pm.response.code === 404) {
        // When the triangle doesn't exist, API should explain why.
        let json;
        try { json = pm.response.json(); } catch (e) { json = null; }
        pm.test('404 response contains detail string', function () {
          pm.expect(json).to.be.an('object');
          pm.expect(json).to.have.property('detail');
          pm.expect(json.detail).to.be.a('string');
          pm.expect(json.detail.length).to.be.above(0);
        });
      }
    language: text/javascript
